seed: 7
deterministic: true
device: cpu
episodes_dir: ../artifacts/smoke_episodes
output_dir: ../artifacts/smoke_calibrator

validation:
  strategy: domain
  domains: []
  fraction: 0.25  # used only when strategy=random

model:
  hidden_dims: [32, 16]
  dropout: 0.0
  min_logit: -8.0
  max_logit: 18.0

loss:
  lambda_oracle: 1.0
  lambda_violation: 0.2
  lambda_utility: 0.01
  lambda_smoothness: 0.001
  under_weight: 2.0
  soft_temperature: 0.35

training:
  epochs: 2
  batch_size: 2
  num_workers: 0
  lr: 0.002
  min_lr: 0.0001
  weight_decay: 0.0001
  grad_clip: 5.0
  early_stopping_patience: 0
