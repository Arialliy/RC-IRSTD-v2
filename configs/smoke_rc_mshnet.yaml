seed: 7
deterministic: true
diagnostic_only: true
device: cpu
output_dir: ../artifacts/smoke_rc_mshnet

data:
  sources:
    - {name: domain_a, path: ../artifacts/smoke_data/domain_a}
    - {name: domain_b, path: ../artifacts/smoke_data/domain_b}
  train_split: train
  val_split: null
  diagnostic_test_eval: false
  image_size: 32
  batch_per_domain: 1
  num_workers: 0
  augment: false

model:
  backend: rc_mshnet
  input_channels: 3
  channels: [16, 32, 64, 128, 256]
  block_counts: [2, 2, 2, 2]
  fusion_channels: 8
  contrast_windows: [3, 7, 15]
  context_dilations: [1, 2]
  component_support_window: 3
  component_ring_window: 7
  use_contrast: true
  use_component_context: true
  use_risk_gate: true
  expose_branch_auxiliary: true

loss:
  lambda_tail: 0.0
  lambda_miss: 0.0
  lambda_margin: 0.0
  auxiliary_weight: 0.10
  sls_kwargs:
    bce_weight: 0.50
    iou_weight: 1.00
    location_weight: 0.25
    max_positive_weight: 50.0

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0001

training:
  checkpoint_selection: fixed_last
  epochs: 1
  warmup_epochs: 0
  min_lr: 0.00001
  grad_clip: 5.0
  amp: false
  validation_interval: 0
  initialize_from: null
  resume: null
